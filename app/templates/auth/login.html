{% extends "base.html" %}
{% block title %}Entrar - LojaFácil{% endblock %}
{% block public_content %}
<div class="auth-screen">
  <form class="auth-card" method="post">
    <div class="auth-logo"><i class="bi bi-shop"></i> LojaFácil</div>
    <div class="auth-sub">Plataforma de lojas virtuais completa</div>
    {% include "_flash.html" %}
    <label class="form-label-lf">E-mail</label>
    <input class="input-lf" name="email" type="email" placeholder="seu@email.com" required>
    <div style="height:.75rem"></div>
    <label class="form-label-lf">Senha</label>
    <input class="input-lf" name="password" type="password" placeholder="********" required>
    <p style="font-size:.78rem;color:#94a3b8">Acesso inicial: admin@lojafacil.com / admin123</p>
    <button class="btn-primary-lf" style="width:100%"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
    <p style="text-align:center;margin:1rem 0 0;font-size:.9rem">Não tem conta? <a href="{{ url_for('auth.register') }}">Criar loja</a></p>
  </form>
</div>
{% endblock %}
