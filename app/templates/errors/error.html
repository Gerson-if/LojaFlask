<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ status_code }} - {{ title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <main class="success-page store-shell">
    <section class="card-lf success-card">
      <div class="success-icon"><i class="bi bi-exclamation-lg"></i></div>
      <div class="page-title">{{ status_code }} - {{ title }}</div>
      <p>{{ message }}</p>
      <a class="btn-primary-lf" href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}">Voltar</a>
    </section>
  </main>
</body>
</html>
